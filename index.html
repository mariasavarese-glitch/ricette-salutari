<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ricette Salutari — Edizione Campana</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
/* ─── TOKENS ──────────────────────────────────────── */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --cream:#f5f0e8;--sand:#e8dcc8;--terracotta:#c4673a;--olive:#6b7c4a;
  --deep:#2a1f14;--gold:#c9a84c;--sea:#3a6b7c;--navy:#1B4F72;
  --mint:#EAFAF1;--peach:#FDEBD0;--sky:#EBF5FB;--sky2:#D6EAF8;
  --motiv:#1D6A39;--aller:#784212;--purple:#6C3483;--purple-bg:#F5EEF8;
}
html{scroll-behavior:smooth}
body{background:var(--cream);font-family:'Crimson Pro',serif;color:var(--deep);min-height:100vh;
  background-image:radial-gradient(ellipse at 10% 20%,rgba(196,103,58,.07) 0%,transparent 50%),
                   radial-gradient(ellipse at 90% 80%,rgba(58,107,124,.07) 0%,transparent 50%)}

/* ─── EDITOR SIDEBAR ──────────────────────────────── */
#editor-sidebar{
  position:fixed;top:0;right:0;width:480px;height:100vh;
  background:#1a1a2e;color:#e8e8f0;z-index:2000;
  display:flex;flex-direction:column;
  transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);
  box-shadow:-8px 0 40px rgba(0,0,0,.4);
}
#editor-sidebar.open{transform:translateX(0)}
.editor-top{
  background:#16213e;padding:1rem 1.2rem;display:flex;align-items:center;
  gap:.8rem;border-bottom:1px solid #2d2d50;flex-shrink:0;
}
.editor-top h2{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:400;flex:1;color:#c9b9e8}
.editor-close{background:none;border:none;color:#999;font-size:1.4rem;cursor:pointer;line-height:1;padding:.2rem}
.editor-close:hover{color:#fff}
.editor-recipe-select{
  padding:.5rem .8rem .5rem 1.2rem;background:#16213e;border-bottom:1px solid #2d2d50;flex-shrink:0;
}
.editor-recipe-select select{
  width:100%;background:#0f3460;color:#e8e8f0;border:1px solid #2d5f8f;
  border-radius:3px;padding:.5rem .8rem;font-family:'Crimson Pro',serif;font-size:.95rem;cursor:pointer;
}
.editor-body{flex:1;overflow-y:auto;padding:1.2rem}
.editor-body::-webkit-scrollbar{width:5px}
.editor-body::-webkit-scrollbar-track{background:#16213e}
.editor-body::-webkit-scrollbar-thumb{background:#2d5f8f;border-radius:3px}
.field-group{margin-bottom:1.1rem}
.field-group label{
  display:block;font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;
  color:#8899cc;margin-bottom:.35rem;
}
.field-group input,.field-group textarea,.field-group select{
  width:100%;background:#0d1b2a;color:#e8e8f0;border:1px solid #2d3a5a;
  border-radius:3px;padding:.55rem .75rem;font-family:'Crimson Pro',serif;
  font-size:.92rem;line-height:1.5;resize:vertical;transition:border-color .2s;
}
.field-group input:focus,.field-group textarea:focus,.field-group select:focus{
  outline:none;border-color:#5b8ee6;background:#0f2340;
}
.field-group textarea{min-height:80px}
.field-group textarea.tall{min-height:120px}
.field-sep{height:1px;background:#2d2d50;margin:1.2rem 0}
.field-section-title{
  font-size:.68rem;letter-spacing:.16em;text-transform:uppercase;
  color:#6c9fff;margin-bottom:.8rem;padding:.3rem 0;
  border-bottom:1px solid #1f2f50;
}
.macro-row{display:grid;grid-template-columns:repeat(4,1fr);gap:.5rem}
.editor-footer{
  padding:1rem 1.2rem;background:#16213e;border-top:1px solid #2d2d50;
  display:flex;gap:.6rem;flex-shrink:0;
}
.btn-apply{
  flex:1;padding:.65rem;background:#1D6A39;color:#fff;border:none;border-radius:3px;
  font-family:'Crimson Pro',serif;font-size:.88rem;letter-spacing:.08em;
  text-transform:uppercase;cursor:pointer;transition:background .2s;
}
.btn-apply:hover{background:#27a34f}
.btn-download{
  flex:1;padding:.65rem;background:#c4673a;color:#fff;border:none;border-radius:3px;
  font-family:'Crimson Pro',serif;font-size:.88rem;letter-spacing:.08em;
  text-transform:uppercase;cursor:pointer;transition:background .2s;
}
.btn-download:hover{background:#d4834a}
.btn-new{
  padding:.65rem 1rem;background:#1B4F72;color:#fff;border:none;border-radius:3px;
  font-family:'Crimson Pro',serif;font-size:.88rem;letter-spacing:.08em;
  text-transform:uppercase;cursor:pointer;transition:background .2s;
}
.btn-new:hover{background:#2471a3}

/* ─── EDIT TOGGLE BUTTON ──────────────────────────── */
#edit-fab{
  position:fixed;bottom:1.8rem;right:1.8rem;z-index:1500;
  width:54px;height:54px;border-radius:50%;background:var(--navy);color:#fff;
  border:none;font-size:1.4rem;cursor:pointer;
  box-shadow:0 4px 20px rgba(27,79,114,.45);transition:all .22s;
  display:flex;align-items:center;justify-content:center;
}
#edit-fab:hover{background:var(--terracotta);transform:scale(1.07)}
#edit-fab.active{background:var(--terracotta)}

/* ─── TOAST ───────────────────────────────────────── */
#toast{
  position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(60px);
  background:#1D6A39;color:#fff;padding:.6rem 1.4rem;border-radius:3px;
  font-size:.85rem;letter-spacing:.06em;z-index:3000;
  transition:transform .3s ease,opacity .3s ease;opacity:0;pointer-events:none;
}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* ─── HEADER ──────────────────────────────────────── */
.site-header{text-align:center;padding:3.5rem 2rem 1.5rem}
.header-line{width:120px;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:0 auto 1.4rem}
.site-header h1{font-family:'Playfair Display',serif;font-size:clamp(2rem,5vw,3.4rem);font-weight:400;letter-spacing:.05em;line-height:1.1}
.site-header h1 em{font-style:italic;color:var(--terracotta)}
.site-header p{margin-top:.7rem;font-size:.82rem;color:var(--sea);font-weight:300;letter-spacing:.14em;text-transform:uppercase}

/* ─── VIEW TABS ───────────────────────────────────── */
.view-tabs{display:flex;justify-content:center;gap:0;margin:1.2rem auto 0;max-width:500px;border:1.5px solid var(--sand);border-radius:3px;overflow:hidden}
.view-tab{flex:1;padding:.55rem 1rem;font-family:'Crimson Pro',serif;font-size:.88rem;letter-spacing:.08em;cursor:pointer;border:none;background:transparent;color:var(--deep);transition:all .22s;text-transform:uppercase}
.view-tab+.view-tab{border-left:1.5px solid var(--sand)}
.view-tab.active{background:var(--navy);color:#fff}
.view-tab:not(.active):hover{background:var(--sand)}

/* ─── FILTER BAR ──────────────────────────────────── */
.filter-bar{display:flex;justify-content:center;flex-wrap:wrap;gap:.55rem;padding:1.4rem 2rem 2rem}
.filter-btn{border:1.5px solid var(--sand);background:transparent;color:var(--deep);font-family:'Crimson Pro',serif;font-size:.88rem;letter-spacing:.06em;padding:.38rem 1rem;cursor:pointer;border-radius:2px;transition:all .22s}
.filter-btn:hover{background:var(--deep);color:var(--cream);border-color:var(--deep)}
.filter-btn.active{background:var(--terracotta);border-color:var(--terracotta);color:#fff}
.view-panel{display:none}
.view-panel.active{display:block}

/* ─── CARDS ───────────────────────────────────────── */
.cards-grid{max-width:1400px;margin:0 auto;padding:0 2rem 5rem;display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:1.8rem}
.card{background:#fff;border-radius:3px;overflow:hidden;box-shadow:0 2px 18px rgba(42,31,20,.06);transition:transform .28s,box-shadow .28s;display:flex;flex-direction:column;opacity:0;animation:fadeUp .5s ease forwards}
.card:hover{transform:translateY(-4px);box-shadow:0 8px 36px rgba(42,31,20,.12)}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.card:nth-child(1){animation-delay:.04s}.card:nth-child(2){animation-delay:.08s}
.card:nth-child(3){animation-delay:.12s}.card:nth-child(4){animation-delay:.16s}
.card:nth-child(5){animation-delay:.20s}.card:nth-child(6){animation-delay:.24s}
.card:nth-child(7){animation-delay:.28s}.card:nth-child(8){animation-delay:.32s}
.card:nth-child(9){animation-delay:.36s}.card:nth-child(10){animation-delay:.40s}
.card:nth-child(11){animation-delay:.44s}.card:nth-child(12){animation-delay:.48s}
.card:nth-child(13){animation-delay:.52s}
.card-accent{height:4px;width:100%}
.card-body{padding:1.5rem 1.5rem .9rem;flex:1}
.card-category{font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;opacity:.75;margin-bottom:.45rem}
.card-title{font-family:'Playfair Display',serif;font-size:1.17rem;font-weight:400;line-height:1.35;margin-bottom:.4rem}
.card-chef{font-size:.8rem;font-style:italic;opacity:.55;margin-bottom:.5rem}
.porzioni-badge{display:inline-block;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;background:var(--deep);color:var(--cream);padding:.18rem .6rem;border-radius:2px;margin-bottom:.5rem}
.divider{height:1px;background:linear-gradient(90deg,var(--sand),transparent);margin:.7rem 0}
.tags{display:flex;flex-wrap:wrap;gap:.35rem;margin-bottom:.7rem}
.tag{font-size:.7rem;padding:.18rem .55rem;border-radius:2px;letter-spacing:.04em}
.tag-km0{background:rgba(107,124,74,.12);color:var(--olive)}
.tag-dop{background:rgba(201,168,76,.15);color:#8a6d1a}
.tag-mare{background:rgba(58,107,124,.12);color:var(--sea)}
.tag-carne{background:rgba(180,60,60,.1);color:#8a2020}
.tag-veg{background:rgba(107,124,74,.12);color:var(--olive)}
.tag-legumi{background:rgba(196,103,58,.12);color:var(--terracotta)}
.tag-integrale{background:rgba(42,31,20,.08);color:var(--deep)}
.ingredients-section{padding:0 1.5rem .9rem}
.ingredients-toggle{display:flex;align-items:center;gap:.45rem;cursor:pointer;font-size:.78rem;letter-spacing:.08em;text-transform:uppercase;color:var(--terracotta);border:none;background:none;font-family:'Crimson Pro',serif;padding:.5rem 0;width:100%;text-align:left;transition:opacity .2s}
.ingredients-toggle:hover{opacity:.65}
.toggle-icon{font-size:1rem;transition:transform .28s;display:inline-block;line-height:1}
.toggle-icon.open{transform:rotate(45deg)}
.ingredients-list{display:none;padding-bottom:.8rem;animation:slideDown .22s ease}
.ingredients-list.open{display:block}
@keyframes slideDown{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
.ingredients-list ul{list-style:none;display:flex;flex-direction:column;gap:.28rem}
.ingredients-list li{font-size:.9rem;display:flex;align-items:flex-start;gap:.45rem;line-height:1.4;font-weight:300}
.ing-dot{width:5px;height:5px;border-radius:50%;background:var(--gold);margin-top:.45em;flex-shrink:0}
.macros{display:grid;grid-template-columns:repeat(4,1fr);background:var(--cream);border-top:1px solid var(--sand);padding:.75rem 1.5rem}
.macro{text-align:center}
.macro-val{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:700;color:var(--deep);line-height:1}
.macro-label{font-size:.63rem;letter-spacing:.07em;text-transform:uppercase;opacity:.5;margin-top:.18rem;display:block}
.detail-btn{display:block;width:100%;padding:.55rem;background:var(--navy);color:#fff;border:none;cursor:pointer;font-family:'Crimson Pro',serif;font-size:.8rem;letter-spacing:.1em;text-transform:uppercase;transition:background .2s}
.detail-btn:hover{background:var(--terracotta)}
.card-edit-btn{display:block;width:100%;padding:.45rem;background:#f0f0f0;color:var(--deep);border:none;cursor:pointer;font-family:'Crimson Pro',serif;font-size:.75rem;letter-spacing:.1em;text-transform:uppercase;transition:background .2s;border-top:1px solid var(--sand)}
.card-edit-btn:hover{background:var(--sand)}
.acc-mare{background:linear-gradient(90deg,var(--sea),#5a9bb0)}
.acc-legumi{background:linear-gradient(90deg,var(--terracotta),#d4845a)}
.acc-veg{background:linear-gradient(90deg,var(--olive),#8a9e60)}
.acc-pasta{background:linear-gradient(90deg,var(--gold),#d4b46c)}
.acc-insalata{background:linear-gradient(90deg,#6b9c7c,#8abf9c)}
.acc-zuppa{background:linear-gradient(90deg,#7c6b3a,#a08c50)}
.cat-mare{color:var(--sea)}.cat-legumi{color:var(--terracotta)}.cat-veg{color:var(--olive)}
.cat-pasta{color:#8a6d1a}.cat-insalata{color:#3a7c5a}.cat-zuppa{color:#7c6b3a}

/* ─── SCHEDE ──────────────────────────────────────── */
.schede-grid{max-width:1100px;margin:0 auto;padding:0 2rem 5rem;display:flex;flex-direction:column;gap:2.4rem}
.scheda{background:#fff;border-radius:4px;overflow:hidden;box-shadow:0 2px 20px rgba(42,31,20,.07);opacity:0;animation:fadeUp .5s ease forwards}
.scheda-header{padding:1.1rem 1.6rem;display:flex;align-items:center;gap:1rem;border-bottom:3px solid var(--navy)}
.scheda-num{font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;color:var(--navy);opacity:.25;line-height:1;flex-shrink:0;min-width:2.2rem}
.scheda-title-block{flex:1}
.scheda-title{font-family:'Playfair Display',serif;font-size:1.25rem;font-weight:400;color:var(--navy);line-height:1.25}
.scheda-chef{font-size:.8rem;font-style:italic;opacity:.55;margin-top:.15rem}
.scheda-body{display:grid;grid-template-columns:1fr 1fr}
@media(max-width:700px){.scheda-body{grid-template-columns:1fr}}
.scheda-cell{padding:1rem 1.4rem;border-right:1px solid var(--sky2);border-bottom:1px solid var(--sky2)}
.scheda-cell:nth-child(2n){border-right:none}
.scheda-cell.full{grid-column:1/-1;border-right:none}
.scheda-cell-label{font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:var(--navy);font-weight:400;margin-bottom:.4rem;display:flex;align-items:center;gap:.4rem}
.scheda-cell-content{font-size:.92rem;line-height:1.6;font-weight:300}
.scheda-cell.allergeni .scheda-cell-content{color:var(--aller);font-weight:400;background:var(--peach);border-radius:3px;padding:.5rem .7rem;font-size:.88rem}
.scheda-cell.motiv .scheda-cell-content{color:var(--motiv);font-weight:300;background:var(--mint);border-radius:3px;padding:.6rem .8rem;font-size:.88rem;line-height:1.65}
.scheda-cell.cottura .scheda-cell-content{color:#5D4037;font-weight:300;background:#FBF7F0;border-radius:3px;padding:.6rem .8rem;font-size:.88rem;line-height:1.65;border-left:3px solid var(--gold)}
.scheda-cell.antitumorale .scheda-cell-content{color:var(--purple);font-weight:300;background:var(--purple-bg);border-radius:3px;padding:.6rem .8rem;font-size:.88rem;line-height:1.65}
.scheda-cell.stagione .scheda-cell-content{font-style:italic;opacity:.7;font-size:.88rem}
.ing-chips{display:flex;flex-wrap:wrap;gap:.35rem}
.ing-chip{background:var(--sky);color:var(--navy);font-size:.75rem;padding:.2rem .55rem;border-radius:2px;line-height:1.4;font-weight:300}
.ing-chip.dop{background:rgba(201,168,76,.2);color:#7a5c10}
.ing-chip.igp{background:rgba(58,107,124,.15);color:var(--sea)}
.ing-chip.km0{background:rgba(107,124,74,.18);color:var(--olive)}
.macros-row{display:grid;grid-template-columns:repeat(4,1fr);background:var(--cream);border-top:1px solid var(--sky2)}
.macros-row .macro{text-align:center;padding:.7rem .5rem}

/* ─── MODAL ───────────────────────────────────────── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(42,31,20,.55);z-index:999;align-items:center;justify-content:center;padding:1rem}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:4px;max-width:700px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25);animation:modalIn .25s ease}
@keyframes modalIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
.modal-close{float:right;margin:1rem 1.2rem 0 0;background:none;border:none;font-size:1.5rem;cursor:pointer;color:var(--deep);opacity:.5;transition:opacity .2s;line-height:1}
.modal-close:hover{opacity:1}

footer{text-align:center;padding:1.8rem;font-size:.73rem;letter-spacing:.1em;text-transform:uppercase;opacity:.4}

@media(max-width:600px){
  .cards-grid,.schede-grid{padding:0 1rem 3rem}
  .site-header{padding:2.5rem 1rem 1.2rem}
  #editor-sidebar{width:100vw}
}

/* ─── NEW SECTIONS ─────────────────────────────────── */
:root {
  --coral: #C0392B; --coral-bg: #FDEDEC;
  --adapt-bg: #F4F6F7; --adapt-border: #AEB6BF;
  --haccp-head: #2C3E50; --haccp-ccp: #E74C3C; --haccp-ok: #27AE60;
}
.scheda-cell.diabete .scheda-cell-content {
  color:var(--coral);font-weight:300;background:var(--coral-bg);border-radius:3px;
  padding:.6rem .8rem;font-size:.88rem;line-height:1.65;border-left:3px solid var(--coral);
}
.adapt-grid {display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:.6rem;margin-top:.4rem}
.adapt-card {background:#fff;border:1px solid var(--adapt-border);border-radius:3px;padding:.7rem .9rem}
.adapt-label {font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;font-weight:600;margin-bottom:.3rem;display:block}
.adapt-text {font-size:.83rem;line-height:1.55;font-weight:300}
.adapt-vegan .adapt-label {color:#27AE60}
.adapt-lattosio .adapt-label {color:#8E44AD}
.adapt-celiaci .adapt-label {color:#D35400}
.adapt-halal .adapt-label {color:#1A5276}
.adapt-kosher .adapt-label {color:#7D6608}

/* HACCP */
.haccp-table-wrap {overflow-x:auto;margin-top:.5rem}
.haccp-flow {display:flex;flex-direction:column;gap:0}
.haccp-step {display:flex;gap:.6rem;align-items:stretch}
.haccp-step-arrow {display:flex;flex-direction:column;align-items:center;flex-shrink:0;width:28px}
.haccp-arrow-line {flex:1;width:2px;background:#AEB6BF;margin:0 auto}
.haccp-arrow-head {font-size:.8rem;color:#AEB6BF;line-height:1}
.haccp-box {flex:1;background:#fff;border:1px solid #AEB6BF;border-radius:3px;margin-bottom:4px;overflow:hidden}
.haccp-box.is-ccp {border-color:var(--haccp-ccp);border-width:2px}
.haccp-box-head {display:flex;align-items:center;gap:.5rem;padding:.5rem .8rem;background:#F2F3F4}
.haccp-box.is-ccp .haccp-box-head {background:#FDEDEC}
.haccp-step-name {font-size:.85rem;font-weight:600;flex:1;line-height:1.3}
.haccp-ccp-badge {font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;
  background:var(--haccp-ccp);color:#fff;padding:.15rem .5rem;border-radius:2px;flex-shrink:0}
.haccp-ok-badge {font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;
  background:var(--haccp-ok);color:#fff;padding:.15rem .5rem;border-radius:2px;flex-shrink:0}
.haccp-box-body {padding:.45rem .8rem .55rem;display:grid;grid-template-columns:1fr 1fr;gap:.3rem .8rem}
@media(max-width:600px){.haccp-box-body{grid-template-columns:1fr}}
.haccp-field label {font-size:.63rem;letter-spacing:.1em;text-transform:uppercase;color:#5D6D7E;display:block;margin-bottom:.1rem}
.haccp-field p {font-size:.82rem;line-height:1.5;font-weight:300}
.haccp-legend {display:flex;gap:1rem;margin-top:.5rem;font-size:.75rem;align-items:center}
.haccp-legend span {display:flex;align-items:center;gap:.3rem}
/* view tab 3 */
.view-tabs {max-width:700px !important}
</style>
</head>
<body>

<!-- ══ EDITOR SIDEBAR ══════════════════════════════ -->
<div id="editor-sidebar">
  <div class="editor-top">
    <h2>✏️ Editor Ricette</h2>
    <button class="editor-close" onclick="toggleEditor()" title="Chiudi">×</button>
  </div>
  <div class="editor-recipe-select">
    <select id="editor-recipe-select" onchange="loadRecipeInEditor(parseInt(this.value))">
    </select>
  </div>
  <div class="editor-body" id="editor-form-body">
    <!-- form fields injected here -->
  </div>
  <div class="editor-footer">
    <button class="btn-apply" onclick="applyEdits()">✓ Applica</button>
    <button class="btn-new" onclick="addNewRecipe()">＋ Nuova</button>
    <button class="btn-download" onclick="downloadHTML()">⬇ Scarica HTML</button>
  </div>
</div>

<!-- ══ EDIT FAB ═════════════════════════════════════ -->
<button id="edit-fab" onclick="toggleEditor()" title="Apri editor">✏️</button>

<!-- ══ HEADER ══════════════════════════════════════ -->
<header class="site-header">
  <div class="header-line"></div>
  <h1>Piatti <em>Salutari</em> Campani</h1>
  <p>Cucina mediterranea · Prevenzione obesità, metabolica, oncologica, DT2, ipertensione · DOP · IGP · km0</p>
  <div class="view-tabs" style="margin-top:1.6rem">

   motivazione:"Il tonno al naturale è proteina magra di alto valore biologico con acidi grassi eessenziali Omega-3. Le olive di Gaeta DOP apportano acidi grassi monoinsaturi (oleico) con effetto cardioprotettivo. Usando riso integrale si aumenta l'apporto di fibre e si abbassa l'indice glicemico rispetto al riso bianco.",

let editorOpen = false;
let currentEditId = 0;

function toggleEditor() {
  editorOpen = !editorOpen;
  document.getElementById('editor-sidebar').classList.toggle('open', editorOpen);
  document.getElementById('edit-fab').classList.toggle('active', editorOpen);
  if (editorOpen) buildEditorSelect();
}

function buildEditorSelect() {
  const sel = document.getElementById('editor-recipe-select');
  sel.innerHTML = data.map(r => `<option value="${r.id}">${r.numero}. ${r.title}</option>`).join('');
  sel.value = currentEditId;
  loadRecipeInEditor(currentEditId);
}

function loadRecipeInEditor(id) {
  currentEditId = id;
  const r = data.find(x => x.id === id);
  if (!r) return;
  const cats = [{v:'mare',l:'Mare & Pesce'},{v:'pasta',l:'Pasta & Cereali'},{v:'insalata',l:'Insalate'},{v:'legumi',l:'Legumi'},{v:'veg',l:'Verdure'}];
  const catOpts = cats.map(c => `<option value="${c.v}" ${r.cat===c.v?'selected':''}>${c.l}</option>`).join('');
  document.getElementById('editor-form-body').innerHTML = `
    <div class="field-section-title">📋 Informazioni base</div>
    <div class="field-group"><label>Nome del piatto</label><input id="ef-title" value="${esc(r.title)}"></div>
    <div class="field-group"><label>Chef / Autore</label><input id="ef-chef" value="${esc(r.chef)}"></div>
    <div class="field-group"><label>Categoria</label><select id="ef-cat">${catOpts}</select></div>
    <div class="field-group"><label>Dosi / Porzioni</label><input id="ef-porzioni" value="${esc(r.porzioni)}"></div>
    <div class="field-group"><label>Nota breve</label><input id="ef-note" value="${esc(r.note)}"></div>
    <div class="field-sep"></div>
    <div class="field-section-title">🛒 Ingredienti (uno per riga)</div>
    <div class="field-group"><textarea id="ef-ing" class="tall">${r.ingredients.join('\n')}</textarea></div>
    <div class="field-sep"></div>
    <div class="field-section-title">⚠️ Allergeni</div>
    <div class="field-group"><input id="ef-allergeni" value="${esc(r.allergeni)}"></div>
    <div class="field-sep"></div>
    <div class="field-section-title">📊 Valori nutrizionali (per porzione)</div>
    <div class="macro-row">
      <div class="field-group"><label>kcal</label><input type="number" id="ef-kcal" value="${r.macros.kcal}"></div>
      <div class="field-group"><label>Proteine g</label><input type="number" id="ef-prot" value="${r.macros.prot}"></div>
      <div class="field-group"><label>Carboidrati g</label><input type="number" id="ef-carb" value="${r.macros.carb}"></div>
      <div class="field-group"><label>Grassi g</label><input type="number" id="ef-grassi" value="${r.macros.grassi}"></div>
    </div>
    <div class="field-sep"></div>
    <div class="field-section-title">👨‍🍳 Procedimento</div>
    <div class="field-group"><textarea id="ef-proc" class="tall">${esc(r.procedimento)}</textarea></div>
    <div class="field-sep"></div>
    <div class="field-section-title">🩺 Motivazione nutrizionale</div>
    <div class="field-group"><textarea id="ef-motiv" class="tall">${esc(r.motivazione)}</textarea></div>
    <div class="field-sep"></div>
    <div class="field-section-title">🍳 Tecniche di cottura</div>
    <div class="field-group"><textarea id="ef-cottura" class="tall">${esc(r.cottura)}</textarea></div>
    <div class="field-sep"></div>
    <div class="field-section-title">🔬 Prevenzione oncologica</div>
    <div class="field-group"><textarea id="ef-antitum" class="tall">${esc(r.antitumorale)}</textarea></div>
    <div class="field-sep"></div>
    <div class="field-section-title">🌿 Stagionalità</div>
    <div class="field-group"><input id="ef-stagione" value="${esc(r.stagione)}"></div>
    <div class="field-sep"></div>
    <div class="field-section-title" style="color:#e07070">🗑 Elimina ricetta</div>
    <div class="field-group">
      <button onclick="deleteRecipe(${r.id})" style="width:100%;padding:.5rem;background:#7a2020;color:#fff;border:none;border-radius:3px;cursor:pointer;font-family:'Crimson Pro',serif;font-size:.85rem">Elimina questa ricetta</button>
    </div>
  `;
}

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }

function applyEdits() {
  const r = data.find(x => x.id === currentEditId);
  if (!r) return;
  r.title       = document.getElementById('ef-title').value.trim();
  r.chef        = document.getElementById('ef-chef').value.trim();
  const newCat  = document.getElementById('ef-cat').value;
  const catLabels = {mare:'Mare & Pesce',pasta:'Pasta & Cereali',insalata:'Insalate di Cereali',legumi:'Zuppe & Legumi',veg:'Verdure & Cereali'};
  r.cat         = newCat;
  r.catLabel    = catLabels[newCat] || newCat;
  r.porzioni    = document.getElementById('ef-porzioni').value.trim();
  r.note        = document.getElementById('ef-note').value.trim();
  r.ingredients = document.getElementById('ef-ing').value.split('\n').map(s=>s.trim()).filter(Boolean);
  r.allergeni   = document.getElementById('ef-allergeni').value.trim();
  r.macros.kcal = parseInt(document.getElementById('ef-kcal').value)||0;
  r.macros.prot = parseInt(document.getElementById('ef-prot').value)||0;
  r.macros.carb = parseInt(document.getElementById('ef-carb').value)||0;
  r.macros.grassi= parseInt(document.getElementById('ef-grassi').value)||0;
  r.procedimento= document.getElementById('ef-proc').value.trim();
  r.motivazione = document.getElementById('ef-motiv').value.trim();
  r.cottura     = document.getElementById('ef-cottura').value.trim();
  r.antitumorale= document.getElementById('ef-antitum').value.trim();
  r.stagione    = document.getElementById('ef-stagione').value.trim();
  renderCards(currentCardFilter);
  renderSchede(currentSchedeFilter);
  buildEditorSelect();
  showToast('✓ Modifiche applicate!');
}

function deleteRecipe(id) {
  if (!confirm('Eliminare questa ricetta?')) return;
  data = data.filter(r => r.id !== id);
  currentEditId = data.length ? data[0].id : -1;
  renderCards(currentCardFilter);
  renderSchede(currentSchedeFilter);
  buildEditorSelect();
  showToast('Ricetta eliminata');
}

function addNewRecipe() {
  const newId = Date.now();
  const newNum = data.length + 1;
  data.push({
    id:newId, numero:newNum,
    title:"Nuova ricetta", chef:"",
    cat:"veg", catLabel:"Verdure & Cereali", accent:"acc-veg",
    tags:[["veg","tag-veg"]], porzioni:"Dosi per 4 persone",
    ingredients:["Ingrediente 1","Ingrediente 2"],
    macros:{kcal:0,prot:0,carb:0,grassi:0},
    note:"", allergeni:"Nessuno",
    procedimento:"Descrivi il procedimento...",
    motivazione:"Descrivi la motivazione nutrizionale...",
    cottura:"Descrivi le tecniche di cottura...",
    antitumorale:"Descrivi i benefici oncologici...",
    stagione:"Tutto l'anno",
    ingChips:[{t:"Ingrediente",c:""}]
  });
  currentEditId = newId;
  renderCards(currentCardFilter);
  renderSchede(currentSchedeFilter);
  buildEditorSelect();
  showToast('✓ Nuova ricetta aggiunta!');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

  // Serialize current data into a self-contained HTML
  const serialized = JSON.stringify(data, null, 2)
    .replace(/<\/script>/g, '<\\/script>');

  // Get the current page HTML and swap out the data array
  let html = document.documentElement.outerHTML;
  // Replace the data array between the markers
  html = html.replace(
    /\/\* ══+ DATA ══+\*\/[\s\S]*?^];/m,
    `/* ${'═'.repeat(50)}\n   DATA\n${'═'.repeat(50)} */\nlet data = ${serialized};`
  );
  const blob = new Blob([html], {type:'text/html;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'ricette_salutari.html';
  a.click();
  showToast('⬇ Download avviato!');
}

  document.body.style.overflow = '';
}

function openEditorFor(id) {
  currentEditId = id;
  if (!editorOpen) toggleEditor();
  else { buildEditorSelect(); }
  document.getElementById('editor-recipe-select').value = id;
  loadRecipeInEditor(id);
  document.getElementById('editor-sidebar').scrollTop = 0;
}
function toggleIng(btn) {
  const list = btn.nextElementSibling;
  const icon = btn.querySelector('.toggle-icon');
  list.classList.toggle('open');
  icon.classList.toggle('open');
}
function switchView(view, btn) {
  document.querySelectorAll('.view-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.view-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('view-'+view).classList.add('active');
  window.scrollTo({top:0, behavior:'smooth'});
  if (view === 'haccp') renderHaccp(currentHaccpFilter);
}
function filterCards(cat, btn) {
  document.querySelectorAll('#view-cards .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards(cat);
}
function filterSchede(cat, btn) {
  document.querySelectorAll('#view-schede .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderSchede(cat);
}

/* ══ RENDER HACCP ══════════════════════════════════════ */
let currentHaccpFilter = 'all';
function renderHaccp(filter) {
  currentHaccpFilter = filter;
  const grid = document.getElementById('haccp-grid');
  grid.innerHTML = '';
  data.filter(r => filter==='all' || r.cat===filter).forEach((r,i) => {
    const ex = extraData[r.id] || {};
    const haccp = ex.haccp || {fasi:[]};
    const adapt = ex.adattamenti || {};
    const diabete = ex.diabete || '';

    const flowHtml = haccp.fasi.map((f,fi) => `
      <div class="haccp-step">
        <div class="haccp-step-arrow">
          ${fi>0?'<div class="haccp-arrow-line"></div><div class="haccp-arrow-head">▼</div>':'<div style="height:8px"></div>'}
        </div>
        <div class="haccp-box ${f.ccp?'is-ccp':''}">
          <div class="haccp-box-head">
            <span class="haccp-step-name">${fi+1}. ${f.nome}</span>
            <span class="${f.ccp?'haccp-ccp-badge':'haccp-ok-badge'}">${f.ccp?'CCP':'CP'}</span>
          </div>
          <div class="haccp-box-body">
            <div class="haccp-field"><label>⚠ Pericolo</label><p>${f.pericolo}</p></div>
            <div class="haccp-field"><label>✓ Misura di controllo</label><p>${f.misura}</p></div>
          </div>
        </div>
      </div>`).join('');

    const adaptHtml = Object.entries(adapt).map(([k,v]) => `
      <div class="adapt-card adapt-${k}">
        <span class="adapt-label">${{vegan:'🌱 Vegan',lattosio:'🥛 Intolleranti lattosio',celiaci:'🌾 Celiaci',halal:'☪ Halal',kosher:'✡ Kosher'}[k]||k}</span>
        <p class="adapt-text">${v}</p>
      </div>`).join('');

    const s = document.createElement('div');
    s.className = 'scheda';
    s.style.animationDelay = `${i*.07}s`;
    s.innerHTML = `
      <div class="scheda-header">
        <div class="scheda-num">${r.numero}</div>
        <div class="scheda-title-block">
          <div class="scheda-title">${r.title}</div>
          ${r.chef?`<div class="scheda-chef">Chef / Autore: ${r.chef}</div>`:''}
        </div>
        <div class="tags" style="margin:0;flex-shrink:0">
          ${r.tags.map(([l,c])=>`<span class="tag ${c}">${l}</span>`).join('')}
        </div>
      </div>
      <div class="scheda-body">
        <div class="scheda-cell diabete full">
          <div class="scheda-cell-label" style="color:var(--coral)"><span class="lbl-icon">💊</span> Prevenzione Diabete T2, Ipertensione &amp; Aterosclerosi</div>
          <div class="scheda-cell-content">${diabete}</div>
        </div>
        <div class="scheda-cell full" style="background:#F8F9FA">
          <div class="scheda-cell-label"><span class="lbl-icon">🍽</span> Adattamenti per esigenze dietetiche e religiose</div>
          <div class="adapt-grid">${adaptHtml}</div>
        </div>
        <div class="scheda-cell full">
          <div class="scheda-cell-label" style="color:var(--haccp-head)"><span class="lbl-icon">🔐</span> Piano HACCP — Diagramma di flusso con CCP</div>
          <div class="haccp-legend">
            <span><span class="haccp-ccp-badge">CCP</span> Punto Critico di Controllo</span>
            <span><span class="haccp-ok-badge">CP</span> Punto di Controllo</span>
          </div>
          <div class="haccp-flow" style="margin-top:.8rem">${flowHtml}</div>
        </div>
      </div>
    `;
    grid.appendChild(s);
  });
}

function filterHaccp(cat, btn) {
  document.querySelectorAll('#view-haccp .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderHaccp(cat);
}
